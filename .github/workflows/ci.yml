name: ci
on: [push, pull_request]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m pip install -U pip
      - run: pip install -r requirements.txt
      - run: python3 -m compileall src
      - name: Run script entrypoint smoke checks
        run: |
          python3 scripts/train_baseline.py --help
          python3 scripts/train_with_dire.py --help
          python3 scripts/calibrate_temperature.py --help
          python3 scripts/build_conformal.py --help
          python3 scripts/eval_commfor.py --help
          python3 scripts/eval_vct2.py --help
          python3 scripts/eval_raid.py --help
          python3 scripts/eval_aria.py --help
          python3 scripts/make_plots.py --help
      - run: pytest -q
