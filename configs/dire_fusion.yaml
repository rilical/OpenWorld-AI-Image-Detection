seed: 123

deterministic: true
device: cpu

output:
  root: "outputs/runs"
  run_name: null

data:
  dataset: "commfor_small"
  batch_size: 16
  num_workers: 2
  img_size: 224
  calibration_fraction: 0.1
  transforms:
    use_corruptions: false
    jpeg_quality: null
    blur_sigma: null
    resize_shorter: 256
    center_crop: true

model:
  type: "clip_dire_fusion"
  clip:
    model_name: "ViT-B-32"
    pretrained: "openai"
    freeze: true
    unfreeze_last_n: 0
  head:
    hidden_dims: [256, 128]
    dropout: 0.1
  dire:
    enabled: true
    cache_dir: "outputs/runs/dire_cache"

train:
  epochs: 1
  lr: 2e-4
  weight_decay: 1e-4
  amp: false
  grad_accum_steps: 1
  best_metric: "auroc"

calibration:
  temperature: true
  conformal_alpha: 0.05
  conformal_method: "split"

eval:
  save_predictions: true
