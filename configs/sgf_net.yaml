seed: 123

deterministic: true
device: cuda

output:
  root: "outputs/runs"
  run_name: null

data:
  dataset: "commfor_small"
  batch_size: 32
  num_workers: 0
  img_size: 224
  calibration_fraction: 0.1
  max_train_samples: null
  max_eval_samples: null
  streaming: false
  shuffle_buffer: 100
  transforms:
    use_corruptions: false
    jpeg_quality: null
    blur_sigma: null
    resize_shorter: 256
    center_crop: true

model:
  type: "sgf_net"
  clip:
    model_name: "ViT-B-32"
    pretrained: "openai"
    freeze: true
  head:
    hidden_dims: [128]
    dropout: 0.1
  sgf:
    spectral_dim: 128
    pixel_dim: 128
    fused_dim: 256
    head_hidden_dims: [128]

train:
  epochs: 30
  steps_per_epoch: 100
  lr: 2e-4
  weight_decay: 1e-4
  amp: false
  grad_accum_steps: 1
  best_metric: "auroc"
  loss: "sgf_net"
  lambda_conf: 0.3

calibration:
  temperature: true
  conformal_alpha: 0.05
  conformal_method: "split"

eval:
  save_predictions: true
